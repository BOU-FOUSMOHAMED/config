# ============================================================
# Configuration partagée entre tous les microservices
# Les propriétés spécifiques à chaque service sont dans
# les fichiers <service-name>.properties
# ============================================================

# Eureka Discovery - commun à plusieurs services
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
eureka.client.enabled=${EUREKA_CLIENT_ENABLED:true}
# JPA / Persistance - configuration par défaut
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}


# Actuator - endpoints communs
management.endpoints.web.exposure.include=health,info
