# ============================================================
# Configuration partagée entre tous les microservices
# Les propriétés spécifiques à chaque service sont dans
# les fichiers <service-name>.properties
# ============================================================

# Eureka Discovery - commun à plusieurs services
eureka.client.service-url.defaultZone=http://discovery-service:8761/eureka/
eureka.instance.prefer-ip-address=true

# JPA / Persistance - configuration par défaut
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger
springdoc.api-docs.path=/api-docs

# Actuator - endpoints communs
management.endpoints.web.exposure.include=health,info
